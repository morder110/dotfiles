# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"
# TODO: Set up "Open folder as sudo"
[mgr]
ratio          = [ 1, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse 	 = false
sort_dir_first = true
sort_translit  = false
sort_fallback  = "alphabetical"
linemode       = "size"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 600
max_height      = 900
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 70
ueberzug_scale  = 1
ueberzug_offset = [ 0, 0, 0, 0 ]

[opener]
edit = [
	# TODO: Chcek out EDITOR variable
	# { run = "${EDITOR:-vi} %s", desc = "$EDITOR",      for = "unix", block = true },
	{ run = 'code "$1" && $(hyprctl -j activeworkspace | jq ".id == 4") || hyprctl dispatch workspace 4 1>/dev/null', desc = "code", block = true, for = "unix" }, # TODO: Fix workspace dispatch to account for if we are already on workspace 4
	# TODO: Add `nano` edit.
]
play = [
	# TODO: Configure play after media player has been set up
	{ run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Show media info", for = "unix" },
]
open = [
    # TODO: Make `xdg-open` open with Alacritty when opening folder
	{ run = "xdg-open %s1", desc = "Open", for = "linux" },
]
reveal = [
	# TODO: Have reveal in terminal (Alacritty) and file exporer (Thunar)
	{ run = 'xdg-open "$(dirname "$1")"', desc = "Reveal (1)", for = "linux" },
	{ run = "xdg-open %d1", desc = "Reveal (2)", for = "linux" },
	# TODO: Replace exiftool with having the info about the file/directory be displayed in the preview panel (split the preview panel into top half, preview and bottom half file info)
	{ run = "clear; exiftool %s1; echo 'Press enter to exit'; read _", desc = "Show EXIF", for = "unix", block = true },
]
extract = [
	# TODO: Set up such that selected files/folders can be archived and possibly compressed. Archive is more important
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]
download = [
	{ run = "ya emit download --open %S", desc = "Download and open" },
	{ run = "ya emit download %S", desc = "Download" },
]

ratarmount =[
	{ run = 'mn=$(mktemp -d); trap "fusermount -u \"$mn\"; rmdir \"$mn\"" EXIT; ratarmount --index-folders ~/.cache/ratarmount "$1" "$mn"; yazi "$mn"', desc = "Mount", block = true, for = "unix" },
	# { run = 'mn=$(mktemp -d); ratarmount --index-folders ~/.cache/ratarmount "$1" "$mn"; yazi "$mn"; fusermount -u "$mn"; rmdir "$mn"', desc = "Mount", block = true, for = "unix" },
	# { run = 'for file in "$@"; do DIR="${file%.*}_mount"; mkdir -p "$DIR" && ratarmount "$file" "$DIR"; done', desc = "Mount", block = true, for = "unix" },
]


[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },

	# TODO: Fix syntax highlighting for:
	# html, xml, and php. Especially variables and conditions to insert a vlaue e.g. `{{ variable }}`
	# bibtex. bib works, but bibtex does not have an icon or syntax highlighting
	# jsonc and json5. json works
	# lua icon and syntax highlighting. luau syntax highlighting
	# 
	# 
	
	
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	{ mime = "application/wine-extension-ini", use = [ "edit", "reveal" ] },
	# JSON
	{ mime = "application/{json,ndjson,jsonc}", use = [ "edit", "reveal" ] }, # TODO: Fix preview
	{ mime = "*/javascript", use = [ "edit", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "open", "reveal" ] }, # TODO: Open image with an image viewer instead of gimp
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "ratarmount", "reveal" ] },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", use = "download" },
	# Fallback
	{ url = "*", use = [ "edit", "open", "reveal" ] },
]

[tasks]
file_workers     = 3
plugin_workers   = 5
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 536870912 # 512MB
image_bound      = [ 5000, 5000 ]
suppress_preload = false

[plugin]
fetchers = [
	# Mimetype
	{ id = "mime", url = "*/",         run = "mime.dir", prio = "high" },
	{ id = "mime", url = "local://*",  run = "mime.local", prio = "high" },
	{ id = "mime", url = "remote://*", run = "mime.remote", prio = "high" },

	# { id = "mount", url = "local://*", run = "mount", prio = "low" },
]
spotters = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]
# TODO: Make sure the preloaders all work
preloaders = [
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
# TODO: Make sure the previwers all work
previewers = [
	{ url = "*/", run = "folder" },
	# Code
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	# JSON
	{ mime = "application/{json,ndjson}", run = "json" },
	# Image
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	# Video
	{ mime = "video/*", run = "video" },
	# PDF
	{ mime = "application/pdf", run = "pdf" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	# Virtual Disk / Disk Image
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	# Font
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	# Empty file
	{ mime = "inode/empty", run = "empty" },
	# Virtual file system
	{ mime = "vfs/*", run = "vfs" },
	# Error
	{ mime = "null/*", run = "null" },
	# Fallback
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

# cd
cd_title  = "Change directory:"
cd_origin = "top-center"
cd_offset = [ 0, 2, 50, 3 ]

# create
create_title  = [ "Create:", "Create (dir):" ]
create_origin = "top-center"
create_offset = [ 0, 2, 50, 3 ]

# rename
rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

# filter
filter_title  = "Filter:"
filter_origin = "top-center"
filter_offset = [ 0, 2, 50, 3 ]

# find
find_title  = [ "Find next:", "Find previous:" ]
find_origin = "top-center"
find_offset = [ 0, 2, 50, 3 ]

# search
search_title  = "Search via {n}:"
search_origin = "top-center"
search_offset = [ 0, 2, 50, 3 ]

# shell
shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "top-center"
shell_offset = [ 0, 2, 50, 3 ]

[confirm]
# trash
trash_title 	= "Trash {n} selected file{s}?"
trash_origin	= "center"
trash_offset	= [ 0, 0, 70, 20 ]

# delete
delete_title 	= "Permanently delete {n} selected file{s}?"
delete_origin	= "center"
delete_offset	= [ 0, 0, 70, 20 ]

# overwrite
overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

# quit
quit_title  = "Quit?"
quit_body   = "The following tasks are still running, are you sure you want to quit?"
# quit_body   = "There are unfinished tasks, quit anyway?\n(Open task manager with default key 'w')"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]

[which]
sort_by      	 = "none"
sort_sensitive = false
sort_reverse 	 = false
sort_translit  = false