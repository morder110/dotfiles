# =====================================================================
# >> Kdenlive
# =====================================================================
    # NOTE: Do not add welcome window (title=Kdenlive). It will cause issues.

    windowrule {
    name = windowrule-dialog

        match:class = ^(org.kde.kdenlive)$
        match:title = ^(Profiles — Kdenlive|Manage Encoding Profiles — Kdenlive|Enter path to the Glaxnimate application — Kdenlive)$

        float = on
        pin = on
    }


# =====================================================================
# >> Discord/Vesktop/Vencord
# =====================================================================
    windowrule {
    name = vesktop

        match:class = ^(vesktop|discord)$

        focus_on_activate = on
        workspace = 10
    }

    windowrule {
    name = vesktop-dialog-file

        match:class = ^(electron37)$
        match:title = ^(blob:https://discord.com/)(.*)

        float = on
        size = (monitor_w*0.30) (monitor_h*0.40)
    }

    windowrule {
    name = vesktop-dialog-quick-css-editor

        match:class = ^(vesktop)$
        match:title = ^(Vencord QuickCSS Editor)$

        float = on
    }


# =====================================================================
# >> Steam
# =====================================================================
    windowrule {
    name = steam

        match:class = ^(steam)$
        match:title = ^(Steam|Sign in to Steam)$

        workspace = 10
    }

    windowrule {
    name = steam-dialog # Redundant due to above

        match:class = ^(steam)$
        match:title = ^(Steam Settings|Friends List)$

        float = on
    }

    windowrule {
    name = steam-dialog-friends

        match:class = ^(steam)$
        match:title = negative:^([Ss]team)(.*)$ # Friend chat windows have dynamic names so we need

        float = on
    }

    windowrule {
    name = steam-dialog-friend-list

        match:class = ^(steam)$
        match:title = ^(Friends List)$

        # Place bottom left
        workspace = 10
        move = 0 (monitor_h*0.50)
        size = (monitor_w*0.15) (monitor_h*0.50)
    }


    windowrule {
    name = steam-dialog-notification

        match:class = ^(steam)$
        match:title = ^(notificationtoasts)$

        workspace = 1 # NOTE: It is not possible to move the notification [to main monitor] so this does not work.
        float = unset
        pin = on
    }


