# ===================================================================
# >> GENERAL / OVERHEAD RULES
# ===================================================================
    workspace = special:exposed,gapsout:60,gapsin:30,bordersize:5,border:on,shadow:false

    layerrule {
    name = layerrule-notification
        blur = on
        ignore_alpha = 0
        match:namespace = notifications
    }

    layerrule {
    name = layerrule-rofi
        match:namespace = Rofi
        blur = on
        blur_popups = on
        ignore_alpha = 0
    }

    layerrule {
    name = layerrule-swaync-cc
        blur = on
        ignore_alpha = 0
        match:namespace = swaync-control-center
    }

    layerrule {
    name = layerrule-swaync-nm
        blur = on
        ignore_alpha = 0
        match:namespace = swaync-notification-window
    }


# =====================================================================
# >> SYSTEM
# =====================================================================
    windowrule {
    name = system-polkit
        match:class = ^(org.kde.polkit-kde-authentication-agent-1)$

        float = on
        center = on
    }

    # TODO: This is WIP and should be both dynamic and moved. With new expression location will be easier.
    # windowrule = float, class:^(com.system.ControlCenter)$
    # # windowrule = size 14% 0%, class:^(com.system.ControlCenter)$
    # windowrule = move 86.36% 28%, class:^(com.system.ControlCenter)$

    # NOTE: These have a high chance to overlap with each other.
    windowrule {
    name = system-xdg-portal-vscode
        match:class = ^(xdg-desktop-portal-gtk)$

        float = on
        # center = on
        # size = 100 1000 # TODO: Look into sizing
    }

    # windowrule = float,class:^(xdg-desktop-portal-gtk)$, title:^(Save As|Open File|Open Folder|Open Workspace from File|Save Workspace|Add Folder to Workspace)$ # VSCode
    # windowrule = float,class:^(xdg-desktop-portal-gtk)$, title:^(Open Files)$ # Vesktop
    # windowrule = float, class:^(xdg-desktop-portal-gtk)$, title:^(blob:https://discord.com/)(.*) # Vesktop

    # TODO: Check this one specifically.
    # windowrule = size (monitor_w*0.30) (monitor_h*0.40), class:^(xdg-desktop-portal-gtk)$, title:^(blob:https://discord.com/)(.*)


# =====================================================================
# >> Alacritty
# =====================================================================
    windowrule {
    name = alacritty-floating

        match:class = ^(Alacritty)$
        match:title = floating

        float = on
        center = on
        size = 1440 800
    }

    windowrule {
    name = alacritty-system-update

        match:class = ^(Alacritty)$
        match:title = floating

        float = on
        center = on
        size = (monitor_w*0.35) (monitor_h*0.45)
    }

    windowrule {
    name = alacritty-system-task-manager

        match:class = ^(Alacritty)$
        match:title = ^(task-manager)$

        float = on
        center = on
        size = (monitor_w*0.40) (monitor_h*0.55)
    }

    windowrule {
    name = alacritty-system-nmtui-manager

        match:class = ^(Alacritty)$
        match:title = floating

        float = on
        center = on
        size = (monitor_w*0.50) (monitor_h*0.60)
    }

    windowrule {
    name = alacritty-system-tray-tui

        match:class = ^(Alacritty)$
        match:title = ^(tray-tui)$

        float = on
        center = on
        size = (monitor_w*0.40) (monitor_h*0.55)
    }


# =====================================================================
