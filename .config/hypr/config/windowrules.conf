    windowrule {
    name = looking-glass

        match:class = ^(looking-glass-client)$

        workspace = 8
    }


# =====================================================================
# >> MISCELLANEOUS
# =====================================================================
    windowrule {
    name = obsidian-dialog

        match:class = ^(electron37)$
        match:title = ^(Open folder as vault)$

        float = on
        center = on
        size = (monitor_w*0.30) (monitor_h*0.40)
    }

    windowrule {
    name = libre-office-dialog

        match:class = ^(office)$
        match:title = ^(.*)(Document Recovery)$

        float = on
    }

    windowrule {
    name = nwg-displays

        match:class = ^(nwg-displays|nwg-look)$

        float = on
        center = on
        size = (monitor_w*0.60) (monitor_h*0.70)
    }

    windowrule {
    name = yad

        match:class = ^(yad)$

        float = on
        center = on
    }

    windowrule {
    name = yazi-preview

        match:class = ^(ueberzugpp_)(.*)

        float = on
        no_focus = on
    }

    windowrule {
    name = pavucontrol

        match:class = ^(pavucontrol|org.pulseaudio.pavucontrol)$

        float = on
        size = (monitor_w*0.60) (monitor_h*0.70)
    }

    windowrule {
    name = flameshot

        match:class = ^(flameshot)$
        match:title = ^(flameshot)$

        stay_focused = on
        animation = fade
        rounding = 0
        border_size = 0
        fullscreen_state = 0 0
        float = on
        pin = on
        # monitor = $TOP_LEFT_MONITOR
        move = 0 0
        # size = (monitor_w*$MONITOR_WIDTH_COUNT) (monitor_h*$MONITOR_HEIGHT_COUNT)
    }

    windowrule {
    name = flameshot-dialog

        match:class = ^(flameshot)$

        float = on
    }

    windowrule {
    name = crossmacro
        match:class = ^(CrossMacro|CrossMacro.UI)$

        float = on
        center = on
    }

