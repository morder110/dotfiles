    windowrule {
    name = game-clustertruck

        match:class = ^(Clustertruck.x86_64|Clustertruck Configuration)$ # TODO: Check if this is meant to be class and title instead of both class for flaot property

        workspace = 9
        float = 9
    }

    windowrule {
    name = game-minecraft

        match:class = ^(Minecraft )(.*)
        match:title = ^(Minecraft )(.*)

        workspace = 9
        size = (monitor_w*1.00) (monitor_h*1.00)
