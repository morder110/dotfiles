# =====================================================================
# >> JetBrains
# =====================================================================
    windowrule {
    name = jetbrains-toolbox

        match:class = ^(jetbrains-toolbox)$
        match:title = ^(Toolbox)$

        workspace = 4
    }

    windowrule {
    name = jetbrains-ide

        match:class = ^(jetbrains-rider|jetbrains-rustrover|jetbrains-clion)$
        match:title = ^(splash)$ # Initial loading window. NOTE: We rely on this, as Editor rule does not work `class:^(jetbrains-rider|jetbrains-rustrover)$, title:^()$`.

        workspace = 4
    }

    windowrule {
    name = jetbrains-dialog-hover # This has the consequence of activating on ALL hover dialogs, even those we WANT to focus. Broken until support for operators with polynomial time

        match:class = ^(jetbrains-rider|jetbrains-rustrover|jetbrains-clion)$
        match:title = ^(win).*#(\d{3,5}) # Last commented part is needed for hover dialogs we do NOT want to focus.

        no_initial_focus = on
    }

    windowrule {
    name = jetbrains-welcome-rider

        match:class = ^(jetbrains-rider)$
        match:title = ^(JetBrains Rider|Welcome to JetBrains Rider)$

        workspace = 4
        float = on
    }

    windowrule {
    name = jetbrains-welcome-rustrover

        match:class = ^(jetbrains-rustrover)$
        match:title = ^(JetBrains RustRover|Welcome to JetBrains RustRover)$

        workspace = 4
        float = on
    }

    windowrule {
    name = jetbrains-welcome-clion

        match:class = ^(jetbrains-clion)$
        match:title = ^(JetBrains CLion|Welcome to CLion)$

        workspace = 4
        float = on
    }


# =====================================================================
# >> MySQL Workbench
# =====================================================================
    windowrule {
    name = mysql-workbench-dialog

        match:class = ^(Mysql-workbench-bin)$
        match:title = ^(MySQL Workbench)$
        match:float = true

        no_initial_focus = on
    }

# =====================================================================
# >> Waterfox
# =====================================================================
    windowrule {
    name = waterfox-dialog-file

        match:class = ^(waterfox)$
        match:title = ^(Save File|Save Image|Enter name of file to save to…)

        float = on
        size = (monitor_w*0.30) (monitor_h*0.40)
    }

    windowrule {
    name = waterfox-dialog-save-or-open-file # Only works sometimes?

        match:class = ^(waterfox)$
        match:title = ^(Opening )(.*)

        float = on
        center = on
        size = (monitor_w*0.50) (monitor_h*0.60)
    }

    windowrule {
    name = waterfox-dialog-general

        match:class = ^(waterfox)$
        match:title = ^()$ # Popup windows such as inspect element

        float = on
    }

    windowrule {
    name = waterfox-dialog-library

        match:class = ^(waterfox)$
        match:title = ^(Library)$

        float = on
        size = (monitor_w*0.50) (monitor_h*0.60)
    }

    windowrule {
    name = waterfox-dialog-user-input

        match:class = ^(waterfox)$
        match:title = ^(Add bookmark folder|Add bookmark)$ # Requires user input and should therefore keep focus

        float = on
        pin = on
    }

    windowrule {
    name = waterfox-picture-in-picture

        match:class = ^(waterfox)$
        match:title = Picture-in-Picture

        float = on
        pin = on
    }


