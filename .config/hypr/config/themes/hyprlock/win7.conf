# TODO: Create another hyprlock with minimalistic features

# Variables
source = $HOME/.config/hypr/config/variables/global.conf

$backgroundPicture = $HOME/.assets/images/lock-screen/windows7-16x10.png

general {
    no_fade_in = false
    no_fade_out = false
    grace = 0
    disable_loading_bar = false
}

background {
    monitor = $PRIMARY_MONITOR
    path = $backgroundPicture
    blur_passes = 0
    contrast = 1
    brightness = 1
    vibrancy = 1
    vibrancy_darkness = 0
}

input-field {
    monitor = $PRIMARY_MONITOR
    halign = center
    valign = center
    size = 220, 35
    position = 0, -100

    invert_numlock = false
    fade_on_empty = false
    hide_input = false
    outline_thickness = 2
    rounding = 1 # -1 means complete rounding (circle/oval)
    inner_color = rgb(255, 255, 255)
    outer_color = rgb(100, 100, 100)
    check_color = rgba(211, 212, 230, 1)
    fail_color = rgba(255, 0, 0, 1)
    capslock_color = rgba(254, 122, 43, 1)
    bothlock_color = rgba(254, 122, 43, 1)


    placeholder_text = <span foreground="##000000">Password...</span>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # TODO: Add this as a string displayed at all times below the input field.

    font_family = Segoe UI
    font_color = rgb(0, 0, 0)
    dots_text_format = *
    dots_center = false
    dots_spacing = 0
    dots_size = 0.4
}

# Username
label {
    monitor = $PRIMARY_MONITOR
    halign = center
    valign = center
    position = 0, -50

    font_size = 20
    text = <b>morder110</b>
    color = "#000000"
    font_family = Segoe UI

    shadow_passes = 5
    shadow_size = 100
    shadow_color = rgba(0, 0, 0, 1)
}

# Power off button bottom right
shape {
    monitor = $PRIMARY_MONITOR
    halign = right
    valign = bottom
    size = 60, 30
    position = -38, 26
    zindex = 1

    color = rgba(255, 0, 0, 0)
    onclick = systemctl poweroff --now
}

# Help button bottom left
shape {
    monitor = $PRIMARY_MONITOR
    halign = left
    valign = bottom
    size = 38, 30
    position = 38, 26
    zindex = 1

    color = rgba(255, 0, 0, 0)
    onclick = systemctl hibernate
}

