# =====================================================================
# >> VARIABLES
# =====================================================================
    $MOD = SUPER
    $SCRIPTS_DIR = $HOME/.config/hypr/scripts
    $CONFIG_DIR = $HOME/.config/hypr/config

    source=$HOME/.config/hypr/config/variables/global.conf

    source=$HOME/.config/hypr/config/keybinds/keyboard/active.conf
    source=$HOME/.config/hypr/config/keybinds/monitor/active.conf
    source=$HOME/.config/hypr/config/keybinds/mouse/active.conf

# =====================================================================
# >> SYSTEM & SESSION CONTROL
# =====================================================================
    bind = $MOD, X, exec, pkill -x wlogout || wlogout # Power menu
    bind = $MOD, L, exec, $SCRIPTS_DIR/lock.sh                # Lock screen
    bind = $MOD Shift, L, exec, $SCRIPTS_DIR/logout.sh        # Exit Hyprland/session
    bind = $MOD Ctrl, R, exec, hyprctl reload && notify-send "Done" "Hyprland reload" # Reload Hyprland
    bind = Ctrl, ESCAPE, exec, pkill -x waybar && waybar    # Reload Waybar
    bind = Ctrl Alt, ESCAPE, exec, pidof waybar && pkill -x waybar || waybar # Toggle Waybar visibility

# =====================================================================
# >> APPLICATION LAUNCHERS
# =====================================================================
    bind = $MOD, Return, exec, $DEFAULT_TERMINAL
    bind = $MOD Shift, Return, exec, $DEFAULT_TERMINAL --title floating
    bind = $MOD, E, exec, $DEFAULT_FILE_MANAGER
    bind = $MOD Shift, E, exec, $DEFAULT_TERMINAL --title floating -e $DEFAULT_CLI_FILE_MANAGER
    bind = $MOD, C, exec, code
    bind = $MOD, B, exec, $DEFAULT_BROWSER

# =====================================================================
# >> UTILITY LAUNCHERS
# =====================================================================
    bind = Ctrl Shift, ESCAPE, exec, alacritty --config-file=$HOME/.config/alacritty/popup.toml -t "task-manager" -e btop # Task manager
    bind = Ctrl ALT Shift, ESCAPE, exec, alacritty --config-file=$HOME/.config/alacritty/popup.toml -t "task-manager" -e sudo btop # Task manager (sudo)
    bind = $MOD, D, exec, (rofi -show drun -kb-cancel Escape,SUPER+q,SUPER+d -global-kb) || pkill -x rofi # Application launcher
    bind = $MOD Alt, C, exec, $SCRIPTS_DIR/cliphist.sh c             # Clipboard manager
    # bind = $MOD Shift, D, exec, $rofi_emoji_script                 # Emoji selector
    # Screenshot TODO: Change for other screenshot thing
    # bind = , print, exec, grim -g "$(slurp)" - | swappy -f -           # Old screenshot command
    # bind = , print, exec, hyprshot -zm region --raw | swappy -f -        # Screenshot region
    bind = , print, exec, flameshot gui                               # Screenshot region
    bind = Ctrl, print, exec, flameshot screen -c -p $HOME/Pictures/Screenshots/                               # Screenshot region
    bind = Ctrl Shift, print, exec, flameshot full -c -p $HOME/Pictures/Screenshots/                               # Screenshot region
    # bind = ,print, exec, hyprshot -zm screen                          # Screenshot screen

# =====================================================================
# >> WINDOW & WORKSPACE MANAGEMENT
# =====================================================================
    bind = $MOD, Q, killactive,                                     # Close active window
    bind = $MOD Ctrl Shift, Q, forcekillactive,                     # Force close active window
    bind = $MOD, F, fullscreen, 0                                   # Toggle fullscreen (real)
    bind = $MOD Shift, F, fullscreen, 1                             # Toggle fullscreen (fake)
    bind = $MOD Shift, P, pin, 1                                    # Toggle pin
    bind = $MOD, V, togglefloating,                                 # Toggle floating for active window
    bind = $MOD Alt, V, exec, hyprctl dispatch workspaceopt allfloat # Make all windows in workspace float
    # bind = $MOD Shift, I, togglesplit                             # Toggle split direction (dwindle layout)
    # bind = $MOD, P, pseudo,                                       # Toggle pseudo-tiling (dwindle layout)
    # bind = $MOD, M, exec, hyprctl dispatch splitratio 0.3         # Adjust split ratio

    bindm = $MOD, mouse:272, movewindow                             # Move window with mouse
    bindm = $MOD, mouse:273, resizewindow                           # Resize window with mouse

    # Resize window
    binde = $MOD CTRL SHIFT, right, resizeactive, 50 0
    binde = $MOD CTRL SHIFT, left, resizeactive, -50 0
    binde = $MOD CTRL SHIFT, up, resizeactive, 0 -40
    binde = $MOD CTRL SHIFT, down, resizeactive, 0 40

    # Move active window
    bind = $MOD SHIFT, down, movewindow, d
    bind = $MOD SHIFT, up, movewindow, u
    bind = $MOD SHIFT, right, movewindow, r
    bind = $MOD SHIFT, left, movewindow, l

    # Move active window to a workspace (follow)
    bind = $MOD SHIFT, 1, movetoworkspace, 1
    bind = $MOD SHIFT, 2, movetoworkspace, 2
    bind = $MOD SHIFT, 3, movetoworkspace, 3
    bind = $MOD SHIFT, 4, movetoworkspace, 4
    bind = $MOD SHIFT, 5, movetoworkspace, 5
    bind = $MOD SHIFT, 6, movetoworkspace, 6
    bind = $MOD SHIFT, 7, movetoworkspace, 7
    bind = $MOD SHIFT, 8, movetoworkspace, 8
    bind = $MOD SHIFT, 9, movetoworkspace, 9
    bind = $MOD SHIFT, 0, movetoworkspace, 10

    # Move active window to a workspace (silent)
    bind = $MOD ALT, 1, movetoworkspacesilent, 1
    bind = $MOD ALT, 2, movetoworkspacesilent, 2
    bind = $MOD ALT, 3, movetoworkspacesilent, 3
    bind = $MOD ALT, 4, movetoworkspacesilent, 4
    bind = $MOD ALT, 5, movetoworkspacesilent, 5
    bind = $MOD ALT, 6, movetoworkspacesilent, 6
    bind = $MOD ALT, 7, movetoworkspacesilent, 7
    bind = $MOD ALT, 8, movetoworkspacesilent, 8
    bind = $MOD ALT, 9, movetoworkspacesilent, 9
    bind = $MOD ALT, 0, movetoworkspacesilent, 10

# =====================================================================
# >> WINDOW & WORKSPACE NAVIGATION
# =====================================================================
    # Switch window
    # TODO: Add Win + Tab similar to windows where show workspaces and windows with icons.
    bind = Alt, Tab, cyclenext,                                     # Cycle to next window
    bind = Alt, Tab, bringactivetotop,                              # Bring active window to top
    bind = Alt Shift, Tab, cyclenext, prev                          # Cycle to previous window
    bind = Alt Shift, Tab, bringactivetotop,                        # Bring active window to top
    bind = ALT, Tab, changegroupactive, f
    bind = ALT SHIFT, Tab, changegroupactive, b

    bind = $MOD, g, togglegroup,                                    # Toggle window grouping
    bind = $MOD CTRL, g, moveoutofgroup,                           # Ungroup single window grouping


    # Move window focus
    bind = $MOD, down, movefocus, d
    bind = $MOD, up, movefocus, u
    bind = $MOD, right, movefocus, r
    bind = $MOD, left, movefocus, l

    # Switch workspaces
    bind = $MOD CTRL, left, workspace, e-1
    bind = $MOD CTRL, right, workspace, e+1

    # Switch workspace
    bind = $MOD, 1, workspace, 1
    bind = $MOD, 2, workspace, 2
    bind = $MOD, 3, workspace, 3
    bind = $MOD, 4, workspace, 4
    bind = $MOD, 5, workspace, 5
    bind = $MOD, 6, workspace, 6
    bind = $MOD, 7, workspace, 7
    bind = $MOD, 8, workspace, 8
    bind = $MOD, 9, workspace, 9
    bind = $MOD, 0, workspace, 10

# =====================================================================
# >> PYPRLAND
# =====================================================================
    # TODO: Set up pyprland
    # Scratchpads & Special Workspaces
    bind = $MOD, A, exec, pypr toggle term                          # Toggle "term" scratchpad
    bind = $MOD, N, exec, pypr toggle_special minimized             # Toggle window to/from "minimized" workspace
    bind = $MOD Shift, N, togglespecialworkspace, minimized         # Toggle visibility of "minimized" workspace

    # Window & Workspace Manipulation
    bind = $MOD Shift, B, exec, pypr expose                         # Expose all windows
    bind = $MOD Shift, J, exec, pypr change_workspace -1            # Switch to previous workspace (multi-monitor aware)
    bind = $MOD Shift, K, exec, pypr change_workspace +1            # Switch to next workspace (multi-monitor aware)
    # bind = $MOD Shift, O, exec, pypr shift_monitors +1            # Swap workspaces between monitors

    # Zoom Feature
    bind = $MOD, Z, exec, pypr zoom                                 # Toggle zoom
    bindr = $MOD Shift, Z, exec, pypr zoom ++0.5                    # Zoom in
    bindr = $MOD Ctrl Shift, Z, exec, pypr zoom --0.5               # Zoom out
    bind = $MOD Shift, mouse_down, exec, pypr zoom ++0.5            # Zoom in with mouse
    bind = $MOD Shift, mouse_up, exec, pypr zoom --0.5              # Zoom out with mouse

# =====================================================================
# >> HARDWARE CONTROLS (Audio, Brightness, etc.)
# =====================================================================
    # Volume control
    bind = , XF86AudioMute, exec, $SCRIPTS_DIR/devices/audio/volume/toggle-mute.sh
    binde = , XF86AudioLowerVolume, exec, $SCRIPTS_DIR/devices/audio/volume/decrease.sh
    binde = , XF86AudioRaiseVolume, exec, $SCRIPTS_DIR/devices/audio/volume/increase.sh

    bind = , XF86AudioMicMute, exec, $SCRIPTS_DIR/devices/audio/microphone/toggle-mute.sh

    # Brightness
    bind = , XF86MonBrightnessDown, exec, $SCRIPTS_DIR/devices/brightness/brightness.sh down
    bind = , XF86MonBrightnessUp, exec, $SCRIPTS_DIR/devices/brightness/brightness.sh up

    # Misc Hardware
    bind = , XF86WLAN, exec, $SCRIPTS_DIR/devices/network/wifi-toggle.sh --only-notify # Native feature for Lenovo laptop

# =====================================================================
# >> MISCELLANEOUS
# =====================================================================
    # Make Ctrl + [1-9] do Alt + [1-9] for Waterfox
    # bind = Ctrl, 2, exec, /home/morder/.config/hypr/scripts/remap/ctrl-num--alt-num.sh 1

# =====================================================================
# >> SUBMAPS
# =====================================================================
    # Window management
    bind = $MOD SHIFT, W, submap, Window Mode
    submap = Window Mode
        bind = $MOD SHIFT, G, submap, Group Mode

        bind = $MOD, Q, killactive,
        bind = CTRL, Q, killactive,

        bind = , down, movefocus, d
        bind = , up, movefocus, u
        bind = , right, movefocus, r
        bind = , left, movefocus, l

        bind = $MOD, down, movefocus, d
        bind = $MOD, up, movefocus, u
        bind = $MOD, right, movefocus, r
        bind = $MOD, left, movefocus, l

        bind = CTRL, down, movewindow, d
        bind = CTRL, up, movewindow, u
        bind = CTRL, right, movewindow, r
        bind = CTRL, left, movewindow, l

        binde = CTRL SHIFT, right, resizeactive, 50 0
        binde = CTRL SHIFT, left, resizeactive, -50 0
        binde = CTRL SHIFT, up, resizeactive, 0 -40
        binde = CTRL SHIFT, down, resizeactive, 0 40

        bind = , 1, workspace, 1
        bind = , 2, workspace, 2
        bind = , 3, workspace, 3
        bind = , 4, workspace, 4
        bind = , 5, workspace, 5
        bind = , 6, workspace, 6
        bind = , 7, workspace, 7
        bind = , 8, workspace, 8
        bind = , 9, workspace, 9
        bind = , 0, workspace, 10

        bind = $MOD, 1, workspace, 1
        bind = $MOD, 2, workspace, 2
        bind = $MOD, 3, workspace, 3
        bind = $MOD, 4, workspace, 4
        bind = $MOD, 5, workspace, 5
        bind = $MOD, 6, workspace, 6
        bind = $MOD, 7, workspace, 7
        bind = $MOD, 8, workspace, 8
        bind = $MOD, 9, workspace, 9
        bind = $MOD, 0, workspace, 10

        bind = CTRL, 1, movetoworkspace, 1
        bind = CTRL, 2, movetoworkspace, 2
        bind = CTRL, 3, movetoworkspace, 3
        bind = CTRL, 4, movetoworkspace, 4
        bind = CTRL, 5, movetoworkspace, 5
        bind = CTRL, 6, movetoworkspace, 6
        bind = CTRL, 7, movetoworkspace, 7
        bind = CTRL, 8, movetoworkspace, 8
        bind = CTRL, 9, movetoworkspace, 9
        bind = CTRL, 0, movetoworkspace, 10

        bind = $MOD SHIFT, w, submap, reset
        bind = , ESCAPE, submap, reset
        bind = , q, submap, reset
    submap = reset

    # Group management
    bind = $MOD SHIFT, G, submap, Group Mode
    submap = Group Mode
        bind = $MOD SHIFT, W, submap, Window Mode

        bind = , g, togglegroup,
        bind = , t, togglegroup,
        bind = , l, lockactivegroup, toggle

        bind = , Tab, changegroupactive, f
        bind = SHIFT, Tab, changegroupactive, b
        bind = ALT , Tab, changegroupactive, f
        bind = ALT SHIFT, Tab, changegroupactive, b

        bind = , left, moveintogroup, l
        bind = , right, moveintogroup, r
        bind = , up, moveintogroup, u
        bind = , down, moveintogroup, d

        bind = , o, moveoutofgroup
        bind = , u, moveoutofgroup

        bind = $MOD, Q, killactive,

        bind = $MOD, down, movefocus, d
        bind = $MOD, up, movefocus, u
        bind = $MOD, right, movefocus, r
        bind = $MOD, left, movefocus, l

        bind = $MOD SHIFT, g, submap, reset
        bind = , ESCAPE, submap, reset
        bind = , q, submap, reset
    submap = reset